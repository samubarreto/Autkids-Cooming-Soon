<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="">
  <title></title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" href="../assets/favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles-pricing.css" />
</head>
<body>

  <header class="top-flags">
    <div class="language-selector">

      <a href="../index.html" class="back-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span data-i18n="btn_back"></span>
      </a>

      <div style="position: relative;">
        <button class="language-trigger" id="langTrigger">
          <img id="currentFlag" src="../assets/bandeiras/brasil.png" alt="">
          <span id="currentLang"></span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M4.5 6L8 9.5L11.5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </button>

        <div class="language-dropdown" id="langDropdown">
          <div class="language-grid">
            <button class="language-option" data-lang="pt" data-name="">
              <img src="../assets/bandeiras/brasil.png" alt="">
              <span></span>
            </button>
            <button class="language-option" data-lang="en" data-name="">
              <img src="../assets/bandeiras/eua.png" alt="">
              <span></span>
            </button>
            <button class="language-option" data-lang="es" data-name="">
              <img src="../assets/bandeiras/espanha.png" alt="">
              <span></span>
            </button>
          </div>
        </div>
      </div>

    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div class="hero-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span data-i18n="hero_badge"></span>
      </div>
      <h1 data-i18n="hero_title"></h1>
      <p data-i18n="hero_desc"></p>
    </div>
  </section>

  <section class="plans-section">
    <div class="plans-grid">

      <div class="plan-card plan-free">
        <div class="plan-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <p class="plan-name" data-i18n="plan_free_name"></p>
        <h2 class="plan-title" data-i18n="plan_free_title"></h2>
        <div class="plan-price">
          <span class="price-lock">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span data-i18n="plan_free_lock"></span>
          </span>
        </div>
        <div class="plan-divider"></div>
        <p class="plan-desc" data-i18n="plan_free_desc"></p>
        <ul class="plan-features">
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="#b07d00" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_free_f1"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="#b07d00" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_free_f2"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="#b07d00" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_free_f3"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="#b07d00" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_free_f4"></span>
          </li>
        </ul>
        <a href="#waitlist" class="plan-cta" data-i18n="plan_free_cta"></a>
      </div>

      <div class="plan-card plan-family">
        <span class="popular-badge" data-i18n="popular_badge"></span>
        <div class="plan-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <p class="plan-name" data-i18n="plan_family_name"></p>
        <h2 class="plan-title" data-i18n="plan_family_title"></h2>
        <div class="plan-price">
          <span class="price-lock">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span data-i18n="plan_family_lock"></span>
          </span>
        </div>
        <div class="plan-divider"></div>
        <p class="plan-desc" data-i18n="plan_family_desc"></p>
        <ul class="plan-features">
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_family_f1"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_family_f2"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_family_f3"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_family_f4"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_family_f5"></span>
          </li>
        </ul>
        <a href="#waitlist" class="plan-cta" data-i18n="plan_family_cta"></a>
      </div>

      <div class="plan-card plan-school">
        <div class="plan-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </div>
        <p class="plan-name" data-i18n="plan_school_name"></p>
        <h2 class="plan-title" data-i18n="plan_school_title"></h2>
        <div class="plan-price">
          <span class="price-lock">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span data-i18n="plan_school_lock"></span>
          </span>
        </div>
        <div class="plan-divider"></div>
        <p class="plan-desc" data-i18n="plan_school_desc"></p>
        <ul class="plan-features">
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="rgba(255,195,0,0.9)" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_school_f1"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="rgba(255,195,0,0.9)" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_school_f2"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="rgba(255,195,0,0.9)" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_school_f3"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="rgba(255,195,0,0.9)" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_school_f4"></span>
          </li>
          <li>
            <span class="feat-dot"><svg viewBox="0 0 12 12" fill="none" stroke="rgba(255,195,0,0.9)" stroke-width="2" stroke-linecap="round"><polyline points="2 6 5 9 10 3"/></svg></span>
            <span data-i18n="plan_school_f5"></span>
          </li>
        </ul>
        <a href="#waitlist" class="plan-cta" data-i18n="plan_school_cta"></a>
      </div>

    </div>
  </section>

  <section class="faq-section">
    <h2 data-i18n="faq_title"></h2>

    <div class="faq-item">
      <button class="faq-q">
        <span data-i18n="faq_q1"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <p class="faq-a" data-i18n="faq_a1"></p>
    </div>

    <div class="faq-item">
      <button class="faq-q">
        <span data-i18n="faq_q2"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <p class="faq-a" data-i18n="faq_a2"></p>
    </div>

    <div class="faq-item">
      <button class="faq-q">
        <span data-i18n="faq_q3"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <p class="faq-a" data-i18n="faq_a3"></p>
    </div>

    <div class="faq-item">
      <button class="faq-q">
        <span data-i18n="faq_q4"></span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <p class="faq-a" data-i18n="faq_a4"></p>
    </div>
  </section>

  <footer class="footer-mini">
    <span data-i18n="footer_rights"></span>
  </footer>

  <script src="translation-pricing.js"></script>
  <script src="pricing.js"></script>

</body>
</html>
