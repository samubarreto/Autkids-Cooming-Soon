<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Central de Ajuda Autkids - Perguntas Frequentes">
  <meta name="theme-color" content="#FFC107">
  <title>Autkids | Central de Ajuda</title>
  <link rel="icon" href="../assets/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-faq.css" />
</head>

<body>

  <!-- HEADER COM SELETOR DE IDIOMA -->
  <header class="top-flags">
    <div class="language-selector">

      <a href="../index.html" class="back-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        <span data-i18n="btn_back">Voltar</span>
      </a>

      <div style="position: relative;">
        <button class="language-trigger" id="langTrigger">
          <img id="currentFlag" src="../assets/brasil.png" alt="Idioma atual">
          <span id="currentLang">Português</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M4.5 6L8 9.5L11.5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </button>

        <div class="language-dropdown" id="langDropdown">
          <div class="language-grid">
            <button class="language-option" data-lang="pt" data-name="Português">
              <img src="../assets/brasil.png" alt="Brasil">
              <span>Português</span>
            </button>
            <button class="language-option" data-lang="en" data-name="English">
              <img src="../assets/eua.png" alt="Estados Unidos">
              <span>English</span>
            </button>
            <button class="language-option" data-lang="es" data-name="Español">
              <img src="../assets/espanha.png" alt="Espanha">
              <span>Español</span>
            </button>
          </div>
        </div>
      </div>

    </div>
  </header>

  <!-- HERO DA FAQ -->
  <header class="faq-header">
    <img src="../assets/LogoAutkids.png" alt="Autkids" class="faq-logo">
    <h1 data-i18n="faq_h1"></h1>
    <p data-i18n="faq_subtitle"></p>
  </header>

  <main class="faq-container">

    <section class="faq-section">
      <h2 data-i18n="faq_sec_about"></h2>
      <div class="faq-item">
        <button class="faq-question" data-i18n="faq_q_what_is"></button>
        <div class="faq-answer"><p data-i18n="faq_a_what_is"></p></div>
      </div>
      <div class="faq-item">
        <button class="faq-question" data-i18n="faq_q_who_for"></button>
        <div class="faq-answer"><p data-i18n="faq_a_who_for"></p></div>
      </div>
      <div class="faq-item">
        <button class="faq-question" data-i18n="faq_q_free"></button>
        <div class="faq-answer"><p data-i18n="faq_a_free"></p></div>
      </div>
    </section>

    <section class="faq-section">
      <h2 data-i18n="faq_sec_account"></h2>
      <div class="faq-item">
        <button class="faq-question" data-i18n="faq_q_create"></button>
        <div class="faq-answer"><p data-i18n="faq_a_create"></p></div>
      </div>
    </section>

    <section class="faq-section">
      <h2 data-i18n="faq_sec_support"></h2>
      <div class="faq-item">
        <button class="faq-question" data-i18n="faq_q_contact"></button>
        <div class="faq-answer"><p data-i18n="faq_a_contact"></p></div>
      </div>
      <div class="faq-item">
        <button class="faq-question" data-i18n="faq_q_hours"></button>
        <div class="faq-answer"><p data-i18n="faq_a_hours"></p></div>
      </div>
    </section>

  </main>

  <footer class="faq-footer">
    <p data-i18n="footer_rights"></p>
  </footer>

  <script src="translation-faq.js"></script>
  <script src="faq.js"></script>
</body>
</html>
